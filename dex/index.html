                            txRemove = await router.removeLiquidityETHWithPermit(ercTokenAddr, lpToRemove, minToken, minETH, account, deadlineUnix, false, permitParams.v, permitParams.r, permitParams.s);
                        } else {
                            txRemove = await router.removeLiquidityETH(ercTokenAddr, lpToRemove, minToken, minETH, account, deadlineUnix);
                        }
                    } else {
                        if (permitParams) {
                            txRemove = await router.removeLiquidityWithPermit(pool.token0.address, pool.token1.address, lpToRemove, am0Min, am1Min, account, deadlineUnix, false, permitParams.v, permitParams.r, permitParams.s);
                        } else {
                            txRemove = await router.removeLiquidity(pool.token0.address, pool.token1.address, lpToRemove, am0Min, am1Min, account, deadlineUnix);
                        }
                    }
                    await txRemove.wait();
                    showToast(t.txSuccess, 'success'); onBack();
                } catch (e) { console.error(e); showToast(t.txFailed, 'error'); }
                finally { setIsRemoving(false); }
            };

            return (
                <div className="glass-card rounded-[2.5rem] p-6 relative z-10 animate-[fadeIn_0.2s_ease-out]">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="text-slate-500 hover:text-cyan-500 dark:text-gray-400 dark:hover:text-cyan-400 transition"><IconBack /></button>
                        <h2 className="text-xl font-bold text-slate-900 dark:text-white">{t.removeLiquidity}</h2>
                        <button onClick={() => setShowSettings(true)} className="text-slate-500 hover:text-cyan-500 dark:text-gray-400 dark:hover:text-cyan-400 transition"><IconSettings /></button>
                    </div>

                    <div className="glass-input rounded-3xl p-8 mb-6 text-center">
                        <div className="text-7xl font-black text-slate-900 dark:text-white mb-8 drop-shadow-sm">{percent}%</div>
                        <input type="range" min="1" max="100" value={percent} onChange={e=>setPercent(Number(e.target.value))} className="w-full mb-8" />
                        <div className="flex gap-3 justify-center">
                            {[25, 50, 75, 100].map(val => (
                                <button key={val} onClick={()=>setPercent(val)} className="glass-btn text-cyan-600 dark:text-cyan-400 px-5 py-2 rounded-xl text-sm font-bold transition shadow-sm">
                                    {val}%
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="space-y-3 mb-8">
                        <div className="flex justify-between text-sm font-bold text-slate-500 dark:text-gray-400 px-2"><span>{t.youReceive}:</span></div>
                        <div className="flex justify-between items-center bg-white/50 dark:bg-dark-800/50 p-4 rounded-2xl border border-white/60 dark:border-dark-600">
                            <span className="font-bold text-2xl text-slate-900 dark:text-white">{amount0}</span>
                            <div className="flex items-center gap-2 glass-btn px-3 py-1.5 rounded-full shadow-sm">
                                <TokenIcon token={pool.token0} className="w-6 h-6 rounded-full" />
                                <span className="font-bold">{pool.token0.symbol}</span>
                            </div>
                        </div>
                        <div className="flex justify-between items-center bg-white/50 dark:bg-dark-800/50 p-4 rounded-2xl border border-white/60 dark:border-dark-600">
                            <span className="font-bold text-2xl text-slate-900 dark:text-white">{amount1}</span>
                            <div className="flex items-center gap-2 glass-btn px-3 py-1.5 rounded-full shadow-sm">
                                <TokenIcon token={pool.token1} className="w-6 h-6 rounded-full" />
                                <span className="font-bold">{pool.token1.symbol}</span>
                            </div>
                        </div>
                    </div>

                    <button onClick={executeRemove} disabled={isRemoving} className="w-full py-4 rounded-[1.5rem] font-bold text-xl btn-primary disabled:opacity-50 disabled:cursor-not-allowed">
                        {isRemoving ? t.confirming : t.remove}
                    </button>
                </div>
            );
        }

        // ==========================================
        // 8. 代币选择/导入弹窗 (TokenModal)
        // ==========================================
        function TokenSelectModal({ isOpen, onClose, tokens, onSelect, t, provider, customTokens, setCustomTokens, showToast }) {
            const [search, setSearch] = useState('');
            const [importTokenData, setImportTokenData] = useState(null);
            const [isSearching, setIsSearching] = useState(false);

            useEffect(() => { if(!isOpen) { setSearch(''); setImportTokenData(null); } }, [isOpen]);

            useEffect(() => {
                const checkAddress = async () => {
                    if (ethers.utils.isAddress(search)) {
                        const exists = tokens.find(t => t.address.toLowerCase() === search.toLowerCase());
                        if (exists) return; 
                        setIsSearching(true);
                        try {
                            const contract = new ethers.Contract(search, ERC20_ABI, provider);
                            const [symbol, name, decimals] = await Promise.all([ contract.symbol(), contract.name(), contract.decimals() ]);
                            setImportTokenData({ address: search, symbol, name, decimals, isNative: false, logoURI: '' });
                        } catch(e) { setImportTokenData(null); }
                        finally { setIsSearching(false); }
                    } else { setImportTokenData(null); }
                };
                checkAddress();
            }, [search, provider, tokens]);

            const handleImport = () => {
                if(importTokenData) {
                    const newTokens = [...customTokens, importTokenData];
                    setCustomTokens(newTokens);
                    localStorage.setItem('robotx_custom_tokens', JSON.stringify(newTokens));
                    onSelect(importTokenData);
                }
            };

            const addTokenToWallet = async (token) => {
                if (!window.ethereum || token.isNative) return;
                try {
                    let imageURL = token.logoURI;
                    if (imageURL === 'logo') {
                        imageURL = window.location.origin + '/assets/images/logo.png';
                    } else if (imageURL === 'usdt') {
                        imageURL = 'https://cryptologos.cc/logos/tether-usdt-logo.png';
                    } else if (imageURL && !imageURL.startsWith('http')) {
                        imageURL = window.location.origin + imageURL;
                    }

                    await window.ethereum.request({
                        method: 'wallet_watchAsset',
                        params: {
                            type: 'ERC20',
                            options: {
                                address: token.address,
                                symbol: token.symbol,
                                decimals: token.decimals,
                                image: imageURL,
                            },
                        },
                    });
                } catch (error) {
                    console.error(error);
                }
            };

            const filteredTokens = tokens.filter(tok => tok.symbol.toLowerCase().includes(search.toLowerCase()) || tok.address.toLowerCase() === search.toLowerCase());

            return (
                <Modal isOpen={isOpen} onClose={onClose} title={t.selectToken}>
                    <input type="text" placeholder={t.searchPlaceholder} className="w-full glass-input rounded-2xl p-4 mb-4 text-slate-900 dark:text-white font-bold outline-none focus:border-cyan-500 transition shadow-inner" value={search} onChange={(e) => setSearch(e.target.value)} />
                    <div className="max-h-[50vh] overflow-y-auto space-y-2 pr-2">
                        {filteredTokens.map((tok, i) => (
                            <div key={i} className="flex items-center justify-between p-3 hover:bg-white/60 dark:hover:bg-dark-700/50 rounded-2xl cursor-pointer transition border border-transparent hover:border-white dark:hover:border-dark-600">
                                <div className="flex items-center gap-4 flex-1" onClick={() => onSelect(tok)}>
                                    <TokenIcon token={tok} className="w-10 h-10 rounded-full shadow-sm" />
                                    <div>
                                        <div className="font-bold text-slate-900 dark:text-white text-lg">{tok.symbol}</div>
                                        <div className="text-xs text-slate-500 dark:text-gray-400 font-medium">{tok.name} {tok.isNative ? '' : `• ${shortenAddress(tok.address)}`}</div>
                                    </div>
                                </div>
                                {!tok.isNative && (
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); addTokenToWallet(tok); }}
                                        className="p-2 text-slate-400 hover:text-cyan-500 hover:bg-cyan-50 dark:hover:bg-cyan-500/10 rounded-xl transition-all"
                                        title={t.addToWallet}
                                    >
                                        <IconWalletAdd />
                                    </button>
                                )}
                            </div>
                        ))}
                        {isSearching && <div className="p-4 text-center text-cyan-500 font-bold text-sm animate-pulse">Searching...</div>}
                        {importTokenData && (
                            <div className="flex items-center justify-between p-4 border border-cyan-500/30 bg-cyan-500/10 rounded-2xl mt-2">
                                <div className="flex items-center gap-3">
                                    <TokenIcon token={importTokenData} className="w-10 h-10 rounded-full" />
                                    <div>
                                        <div className="font-bold text-slate-900 dark:text-white">{importTokenData.symbol}</div>
                                        <div className="text-xs text-cyan-600 dark:text-cyan-400">{shortenAddress(importTokenData.address)}</div>
                                    </div>
                                </div>
                                <button onClick={handleImport} className="btn-primary px-5 py-2 rounded-xl text-sm transition">{t.importToken}</button>
                            </div>
                        )}
                    </div>
                </Modal>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
